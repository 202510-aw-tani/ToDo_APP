<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">ToDoを削除しました</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">削除に失敗しました</span>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">ToDo一覧</h1>
        <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'id'} ? 'active' : ''"
               th:href="@{/todo(sort='id', categoryId=${selectedCategoryId})}" href="/todo?sort=id">ID順</a>
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'priority'} ? 'active' : ''"
               th:href="@{/todo(sort='priority', categoryId=${selectedCategoryId})}" href="/todo?sort=priority">優先度順</a>
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'deadline'} ? 'active' : ''"
               th:href="@{/todo(sort='deadline', categoryId=${selectedCategoryId})}" href="/todo?sort=deadline">期限日順</a>
            <form class="d-flex align-items-center gap-2" th:action="@{/todo}" action="/todo" method="get">
                <input type="hidden" name="sort" th:value="${sort}">
                <select class="form-select" name="categoryId" style="min-width: 160px;">
                    <option value="">全カテゴリ</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${category.id == selectedCategoryId}">
                        カテゴリ
                    </option>
                </select>
                <button type="submit" class="btn btn-outline-secondary">絞り込み</button>
                <a class="btn btn-outline-secondary" th:href="@{/todo(sort=${sort})}" href="/todo">リセット</a>
            </form>
            <a class="btn btn-outline-secondary" th:href="@{/todo/export}" href="/todo/export">CSVダウンロード</a>
            <a class="btn btn-primary" href="/todo/new">新規登録</a>
        </div>
    </div>

    <div th:if="${todoPage.empty}" class="card shadow-sm">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-2">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">まずは1件、ToDoを新規作成してみましょう。</p>
            <a class="btn btn-primary" href="/todo/new">新規作成</a>
        </div>
    </div>

    <div th:unless="${todoPage.empty}" class="card shadow-sm">
        <form th:action="@{/todo/bulk-delete}" action="/todo/bulk-delete" method="post"
              onsubmit="return confirm('選択したToDoを削除しますか？');">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 48px;">
                        <input type="checkbox" id="selectAll">
                    </th>
                    <th style="width: 80px;">ID</th>
                    <th>タイトル</th>
                    <th style="width: 120px;">優先度</th>
                    <th style="width: 140px;">カテゴリ</th>
                    <th style="width: 140px;">期限日</th>
                    <th style="width: 120px;">完了状態</th>
                    <th style="width: 120px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todoPage.content}"
                    th:classappend="${todo.overdue} ? 'overdue-row' : (${todo.nearDeadline} ? 'warning-row' : '')">
                    <td>
                        <input type="checkbox" class="row-check" name="ids" th:value="${todo.id}">
                    </td>
                    <td th:text="${todo.id}">1</td>
                    <td>
                        <span th:text="${todo.title}" th:classappend="${todo.completed} ? 'text-decoration-line-through' : ''">サンプルタスク</span>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${todo.priority.badgeClass}"
                              th:text="${todo.priority.label}">中</span>
                    </td>
                    <td>
                        <span th:if="${todo.category != null}"
                              class="badge text-white"
                              th:style="'background-color:' + ${todo.category.color}"
                              th:text="${todo.category.name}">カテゴリ</span>
                        <span th:if="${todo.category == null}" class="text-muted">未選択</span>
                    </td>
                    <td>
                        <div th:text="${todo.deadline != null} ? ${#temporals.format(todo.deadline, 'yyyy-MM-dd')} : '-'">-</div>
                        <div class="small">
                            <span th:if="${todo.overdue}" class="text-danger">期限切れ</span>
                            <span th:if="${!todo.overdue and todo.nearDeadline}"
                                  class="text-warning-emphasis"
                                  th:text="'あと' + ${todo.daysUntilDeadline} + '日'">あと3日</span>
                        </div>
                    </td>
                    <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                    <td>
                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" action="/todo/1/toggle" method="post" class="d-inline me-2">
                            <button type="submit" class="btn btn-outline-secondary btn-sm"
                                    th:text="${todo.completed} ? '未完了に戻す' : '完了にする'">完了にする</button>
                        </form>
                        <a class="btn btn-outline-primary btn-sm me-2"
                           th:href="@{/todo/{id}/edit(id=${todo.id})}" href="/todo/1/edit">編集</a>
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" action="/todo/1/delete" method="post" class="d-inline"
                              onsubmit="return confirm('本当に削除しますか？')">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
            <div class="text-muted small">
                <span th:text="'全' + ${totalCount} + '件中 ' + ${rangeStart} + '-' + ${rangeEnd} + '件'">全0件中 0-0件</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button type="submit" class="btn btn-danger btn-sm">選択した項目を削除</button>
                <nav aria-label="ToDo pagination">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${todoPage.first} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="${todoPage.first} ? '#' : @{/todo(page=${todoPage.number - 1}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               aria-label="前へ">前へ</a>
                        </li>
                        <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                            th:classappend="${pageNumber == todoPage.number} ? 'active' : ''">
                            <a class="page-link"
                               th:href="@{/todo(page=${pageNumber}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               th:text="${pageNumber + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${todoPage.last} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="${todoPage.last} ? '#' : @{/todo(page=${todoPage.number + 1}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               aria-label="次へ">次へ</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
        </form>
    </div>
</div>
<script>
    const selectAll = document.getElementById('selectAll');
    if (selectAll) {
        selectAll.addEventListener('change', () => {
            document.querySelectorAll('.row-check').forEach((checkbox) => {
                checkbox.checked = selectAll.checked;
            });
        });
    }
    document.querySelectorAll('.row-check').forEach((checkbox) => {
        checkbox.addEventListener('change', () => {
            const checks = document.querySelectorAll('.row-check');
            const checked = document.querySelectorAll('.row-check:checked');
            if (selectAll) {
                selectAll.checked = checks.length > 0 && checks.length === checked.length;
            }
        });
    });
    window.setTimeout(() => {
        document.querySelectorAll('.alert').forEach((alert) => {
            alert.classList.remove('show');
            alert.classList.add('fade');
            window.setTimeout(() => alert.remove(), 200);
        });
    }, 3000);
</script>
<style>
    .overdue-row {
        background-color: #f8d7da;
    }
    .warning-row {
        background-color: #fff3cd;
    }
</style>
</body>
</html>
