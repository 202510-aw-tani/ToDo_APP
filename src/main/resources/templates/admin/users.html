<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ユーザー管理</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">ユーザー管理</h1>
        <div class="d-flex align-items-center gap-2">
            <span class="small text-muted" sec:authorize="isAuthenticated()">
                ログイン中: <strong sec:authentication="name">admin</strong>
            </span>
            <a class="btn btn-outline-secondary" th:href="@{/todo}" href="/todo">ToDo一覧へ戻る</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}">更新しました。</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}">更新に失敗しました。</span>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 90px;">ID</th>
                    <th>ユーザー名</th>
                    <th style="width: 140px;">ロール</th>
                    <th style="width: 140px;">状態</th>
                    <th style="width: 120px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.username}">admin</td>
                    <td th:text="${user.role}">ROLE_ADMIN</td>
                    <td>
                        <span th:if="${user.enabled}" class="badge bg-success">有効</span>
                        <span th:if="${!user.enabled}" class="badge bg-secondary">無効</span>
                    </td>
                    <td>
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/admin/users/{id}/edit(id=${user.id})}" href="/admin/users/1/edit">編集</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
