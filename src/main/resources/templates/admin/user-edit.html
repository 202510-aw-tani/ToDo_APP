<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ユーザー編集</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">ユーザー編集</h1>
        <a class="btn btn-outline-secondary" th:href="@{/admin/users}" href="/admin/users">戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/admin/users/{id}/update(id=${user.id})}" action="/admin/users/1/update" method="post">
                <div class="mb-3">
                    <label class="form-label">ID</label>
                    <input type="text" class="form-control" th:value="${user.id}" value="1" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label">ユーザー名</label>
                    <input type="text" class="form-control" th:value="${user.username}" value="admin" readonly>
                </div>
                <div class="mb-3">
                    <label for="role" class="form-label">ロール</label>
                    <select id="role" name="role" class="form-select">
                        <option value="ROLE_USER" th:selected="${user.role == 'ROLE_USER'}">USER</option>
                        <option value="ROLE_ADMIN" th:selected="${user.role == 'ROLE_ADMIN'}">ADMIN</option>
                    </select>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="enabled" name="enabled" th:checked="${user.enabled}">
                    <label class="form-check-label" for="enabled">アカウント有効</label>
                </div>
                <button type="submit" class="btn btn-primary">更新</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
