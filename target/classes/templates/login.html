<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3 text-center">ToDoログイン</h1>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        ユーザー名またはパスワードが正しくありません。
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        ログアウトしました。
                    </div>

                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-3">
                            <label for="username" class="form-label">ユーザー名</label>
                            <input id="username" name="username" type="text" class="form-control" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">パスワード</label>
                            <input id="password" name="password" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">ログイン</button>
                    </form>
                </div>
            </div>
            <p class="text-muted small mt-3 mb-0 text-center">初期管理者: admin / admin123</p>
            <p class="text-muted small mt-1 text-center">初期一般ユーザー: user / user123</p>
        </div>
    </div>
</div>
</body>
</html>
