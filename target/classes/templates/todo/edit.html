<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ToDo編集</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success" role="alert">
        <span th:text="${successMessage}">更新しました。</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
        <span th:text="${errorMessage}">エラーが発生しました。</span>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">ToDo編集</h1>
        <a class="btn btn-outline-secondary" href="/todo">戻る</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{/todo/{id}/update(id=${todo.id})}" action="/todo/1/update" method="post">
                <div class="mb-3">
                    <label for="title" class="form-label">タイトル</label>
                    <input type="text" id="title" name="title" class="form-control"
                           th:value="${todo.title}" value="サンプルタスク">
                </div>
                <div class="mb-3">
                    <label for="priority" class="form-label">優先度</label>
                    <select id="priority" name="priority" class="form-select">
                        <option th:each="p : ${T(com.example.todo.model.Priority).values()}"
                                th:value="${p}"
                                th:text="${p.label}"
                                th:selected="${p == todo.priority}">
                            中
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="categoryId" class="form-label">カテゴリ</label>
                    <select id="categoryId" name="categoryId" class="form-select">
                        <option value="" th:selected="${todo.categoryId == null}">未選択</option>
                        <option th:each="category : ${categories}"
                                th:value="${category.id}"
                                th:text="${category.name}"
                                th:selected="${category.id == todo.categoryId}">
                            カテゴリ
                        </option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="deadline" class="form-label">期限日</label>
                    <input type="date" id="deadline" name="deadline" class="form-control"
                           th:value="${todo.deadline}">
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">更新</button>
                    <a class="btn btn-outline-secondary" href="/todo">戻る</a>
                </div>
            </form>
        </div>
    </div>

    <div class="card shadow-sm mt-3">
        <div class="card-header">添付ファイル</div>
        <div class="card-body">
            <form th:action="@{/todo/{id}/attachments(id=${todo.id})}"
                  action="/todo/1/attachments"
                  method="post"
                  enctype="multipart/form-data"
                  class="row g-2 align-items-center mb-3">
                <div class="col-12 col-md">
                    <input type="file" name="file" class="form-control" required>
                </div>
                <div class="col-12 col-md-auto">
                    <button type="submit" class="btn btn-primary">アップロード</button>
                </div>
            </form>

            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead>
                    <tr>
                        <th>ファイル名</th>
                        <th style="width: 140px;">サイズ</th>
                        <th style="width: 200px;">アップロード日時</th>
                        <th style="width: 180px;">操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(attachments)}">
                        <td colspan="4" class="text-muted">添付ファイルはありません。</td>
                    </tr>
                    <tr th:each="attachment : ${attachments}">
                        <td th:text="${attachment.originalFilename}">sample.txt</td>
                        <td th:text="${attachment.fileSize + ' bytes'}">0 bytes</td>
                        <td th:text="${#temporals.format(attachment.uploadedAt, 'yyyy-MM-dd HH:mm:ss')}">2026-01-01 12:00:00</td>
                        <td>
                            <a class="btn btn-outline-secondary btn-sm"
                               th:href="@{/todo/attachments/{attachmentId}/download(attachmentId=${attachment.id})}">
                                ダウンロード
                            </a>
                            <form th:action="@{/todo/attachments/{attachmentId}/delete(attachmentId=${attachment.id})}"
                                  method="post"
                                  class="d-inline"
                                  onsubmit="return confirm('この添付ファイルを削除しますか？')">
                                <button type="submit" class="btn btn-outline-danger btn-sm">削除</button>
                            </form>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
