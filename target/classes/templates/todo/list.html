<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{todo.list.title}">ToDo一覧</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
</head>
<body class="bg-light">
<div class="container py-4">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}">Success</span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}">Error</span>
    </div>

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0" th:text="#{todo.list.heading}">ToDo一覧</h1>
        <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/todo(lang='ja', sort=${sort}, categoryId=${selectedCategoryId})}" th:text="#{lang.ja}">日本語</a>
            <a class="btn btn-outline-secondary btn-sm" th:href="@{/todo(lang='en', sort=${sort}, categoryId=${selectedCategoryId})}" th:text="#{lang.en}">English</a>
            <span class="small text-muted" sec:authorize="isAuthenticated()">
                <span th:text="#{todo.list.loggedInAs}">Signed in:</span> <strong sec:authentication="name">user</strong>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger" th:text="#{todo.list.logout}">Logout</button>
            </form>
            <a sec:authorize="hasRole('ADMIN')" class="btn btn-outline-dark" th:href="@{/admin/users}" href="/admin/users"
               th:text="#{todo.list.userAdmin}">
                ユーザー管理
            </a>
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'id'} ? 'active' : ''"
               th:href="@{/todo(sort='id', categoryId=${selectedCategoryId})}" href="/todo?sort=id" th:text="#{todo.list.sort.id}">ID順</a>
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'priority'} ? 'active' : ''"
               th:href="@{/todo(sort='priority', categoryId=${selectedCategoryId})}" href="/todo?sort=priority" th:text="#{todo.list.sort.priority}">優先度順</a>
            <a class="btn btn-outline-secondary"
               th:classappend="${sort == 'deadline'} ? 'active' : ''"
               th:href="@{/todo(sort='deadline', categoryId=${selectedCategoryId})}" href="/todo?sort=deadline" th:text="#{todo.list.sort.deadline}">期限日順</a>
            <form class="d-flex align-items-center gap-2" th:action="@{/todo}" action="/todo" method="get">
                <input type="hidden" name="sort" th:value="${sort}">
                <select class="form-select" name="categoryId" style="min-width: 160px;">
                    <option value="" th:text="#{todo.list.allCategories}">全カテゴリ</option>
                    <option th:each="category : ${categories}"
                            th:value="${category.id}"
                            th:text="${category.name}"
                            th:selected="${category.id == selectedCategoryId}">
                        Category
                    </option>
                </select>
                <button type="submit" class="btn btn-outline-secondary" th:text="#{common.filter}">絞り込み</button>
                <a class="btn btn-outline-secondary" th:href="@{/todo(sort=${sort})}" href="/todo" th:text="#{common.reset}">リセット</a>
            </form>
            <a class="btn btn-outline-secondary" th:href="@{/todo/export}" href="/todo/export" th:text="#{todo.list.csv}">CSVダウンロード</a>
            <a class="btn btn-primary" href="/todo/new" th:text="#{todo.list.new}">新規登録</a>
        </div>
    </div>

    <div th:if="${todoPage.empty}" class="card shadow-sm">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-2" th:text="#{todo.list.empty.title}">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4" th:text="#{todo.list.empty.desc}">まずは1件、ToDoを新規作成してみましょう。</p>
            <a class="btn btn-primary" href="/todo/new" th:text="#{todo.list.empty.button}">新規作成</a>
        </div>
    </div>

    <div th:unless="${todoPage.empty}" class="card shadow-sm">
        <form id="bulkDeleteForm"
              th:action="@{/todo/bulk-delete}"
              action="/todo/bulk-delete"
              method="post"
              onsubmit="return confirm('Delete selected ToDo items?');">
        </form>
        <div class="card-body p-0">
            <table class="table table-striped mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 48px;">
                        <input type="checkbox" id="selectAll">
                    </th>
                    <th style="width: 80px;" th:text="#{todo.list.id}">ID</th>
                    <th th:text="#{todo.list.titleCol}">タイトル</th>
                    <th sec:authorize="hasRole('ADMIN')" style="width: 120px;" th:text="#{todo.list.createdBy}">作成者</th>
                    <th style="width: 120px;" th:text="#{todo.list.priority}">優先度</th>
                    <th style="width: 140px;" th:text="#{todo.list.category}">カテゴリ</th>
                    <th style="width: 140px;" th:text="#{todo.list.deadline}">期限日</th>
                    <th style="width: 120px;" th:text="#{todo.list.status}">完了状態</th>
                    <th style="width: 120px;" th:text="#{common.actions}">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todoPage.content}"
                    th:classappend="${todo.overdue} ? 'overdue-row' : (${todo.nearDeadline} ? 'warning-row' : '')">
                    <td>
                        <input type="checkbox" class="row-check" name="ids" th:value="${todo.id}" form="bulkDeleteForm">
                    </td>
                    <td th:text="${todo.id}">1</td>
                    <td>
                        <span th:text="${todo.title}" th:classappend="${todo.completed} ? 'text-decoration-line-through' : ''">Sample task</span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')" th:text="${todo.createdBy}">admin</td>
                    <td>
                        <span class="badge"
                              th:classappend="${todo.priority.badgeClass}"
                              th:text="${#messages.msg('priority.' + todo.priority.name())}">中</span>
                    </td>
                    <td>
                        <span th:if="${todo.category != null}"
                              class="badge text-white"
                              th:style="'background-color:' + ${todo.category.color}"
                              th:text="${todo.category.name}">Category</span>
                        <span th:if="${todo.category == null}" class="text-muted" th:text="#{common.notSelected}">未選択</span>
                    </td>
                    <td>
                        <div th:text="${todo.deadline != null ? #temporals.format(todo.deadline, 'yyyy-MM-dd') : '-'}">-</div>
                        <div class="small">
                            <span th:if="${todo.overdue}" class="text-danger" th:text="#{todo.list.overdue}">期限切れ</span>
                            <span th:if="${!todo.overdue and todo.nearDeadline}"
                                  class="text-warning-emphasis"
                                  th:text="${#messages.msg('todo.list.daysLeft', todo.daysUntilDeadline)}">あと3日</span>
                        </div>
                    </td>
                    <td th:text="${todo.completed ? #messages.msg('todo.list.status.done') : #messages.msg('todo.list.status.notDone')}">未完了</td>
                    <td>
                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" action="/todo/1/toggle" method="post" class="d-inline me-2">
                            <button type="submit" class="btn btn-outline-secondary btn-sm"
                                    th:text="${todo.completed ? #messages.msg('todo.list.markUndone') : #messages.msg('todo.list.markDone')}">完了にする</button>
                        </form>
                        <a class="btn btn-outline-primary btn-sm me-2"
                           th:href="@{/todo/{id}/edit(id=${todo.id})}" href="/todo/1/edit" th:text="#{common.edit}">編集</a>
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}" action="/todo/1/delete" method="post" class="d-inline"
                              onsubmit="return confirm('Are you sure to delete this item?')">
                            <button type="submit" class="btn btn-danger btn-sm" th:text="#{common.delete}">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        <div class="card-footer d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-2">
            <div class="text-muted small">
                <span th:text="${#messages.msg('todo.list.range', totalCount, rangeStart, rangeEnd)}">全0件中 0-0件</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                <button type="submit" form="bulkDeleteForm" class="btn btn-danger btn-sm" th:text="#{todo.list.bulkDelete}">選択した項目を削除</button>
                <nav aria-label="ToDo pagination">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${todoPage.first} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="${todoPage.first} ? '#' : @{/todo(page=${todoPage.number - 1}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               th:attr="aria-label=#{common.previous}" th:text="#{common.previous}">前へ</a>
                        </li>
                        <li class="page-item" th:each="pageNumber : ${pageNumbers}"
                            th:classappend="${pageNumber == todoPage.number} ? 'active' : ''">
                            <a class="page-link"
                               th:href="@{/todo(page=${pageNumber}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               th:text="${pageNumber + 1}">1</a>
                        </li>
                        <li class="page-item" th:classappend="${todoPage.last} ? 'disabled' : ''">
                            <a class="page-link"
                               th:href="${todoPage.last} ? '#' : @{/todo(page=${todoPage.number + 1}, sort=${sort}, categoryId=${selectedCategoryId})}"
                               th:attr="aria-label=#{common.next}" th:text="#{common.next}">次へ</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>
<script>
    const selectAll = document.getElementById('selectAll');
    if (selectAll) {
        selectAll.addEventListener('change', () => {
            document.querySelectorAll('.row-check').forEach((checkbox) => {
                checkbox.checked = selectAll.checked;
            });
        });
    }
    document.querySelectorAll('.row-check').forEach((checkbox) => {
        checkbox.addEventListener('change', () => {
            const checks = document.querySelectorAll('.row-check');
            const checked = document.querySelectorAll('.row-check:checked');
            if (selectAll) {
                selectAll.checked = checks.length > 0 && checks.length === checked.length;
            }
        });
    });
    window.setTimeout(() => {
        document.querySelectorAll('.alert').forEach((alert) => {
            alert.classList.remove('show');
            alert.classList.add('fade');
            window.setTimeout(() => alert.remove(), 200);
        });
    }, 3000);
</script>
<style>
    .overdue-row {
        background-color: #f8d7da;
    }
    .warning-row {
        background-color: #fff3cd;
    }
</style>
</body>
</html>
